<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Latent Canvas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage" class="stage">
      <div class="window" id="window">
        <header class="titlebar" aria-hidden="true">
          <div class="dots">
            <span class="dot dot--red"></span>
            <span class="dot dot--yellow"></span>
            <span class="dot dot--green"></span>
          </div>
          <div class="title">LATENT CANVAS</div>
          <div class="meta">
            <span id="fps" class="meta__fps">— fps</span>
            <span id="status" class="meta__status">booting</span>
            <button
              id="feedToggle"
              class="meta__btn"
              type="button"
              aria-pressed="false"
              title="Toggle camera feed (c)"
            >CAM</button>
            <button
              id="inspectorToggle"
              class="meta__btn"
              type="button"
              aria-expanded="false"
              aria-controls="inspector"
              title="Toggle plan inspector (i)"
            >JSON</button>
          </div>
        </header>

        <div class="canvas-wrap">
          <video id="video" playsinline muted autoplay aria-hidden="true"></video>
          <canvas id="output" class="output"></canvas>

          <div class="overlay overlay--top">
            <span class="badge" id="countBadge">0 objects</span>
            <span class="badge badge--title" id="planTitle">Neutral</span>
          </div>

          <div class="overlay overlay--bottom">
            <div class="controls">
              <form class="prompt" id="promptForm" autocomplete="off">
                <input
                  type="text"
                  id="promptInput"
                  class="prompt__input"
                  placeholder="direct the scene — e.g. make the person sacred and the laptop poisonous"
                  maxlength="500"
                  spellcheck="false"
                  aria-label="Scene prompt"
                />
                <button type="submit" class="prompt__submit" id="promptSubmit">Apply</button>
                <span class="prompt__status" id="promptStatus" role="status" aria-live="polite"></span>
              </form>
              <div class="presets" role="tablist" aria-label="Action plan presets" id="presetRow"></div>
              <label class="intensity">
                <span class="intensity__label">Intensity</span>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value="80"
                  step="1"
                  id="intensitySlider"
                  class="intensity__slider"
                  aria-label="Global intensity"
                />
                <span class="intensity__value" id="intensityValue">80</span>
              </label>
            </div>
          </div>

          <aside id="inspector" class="inspector" aria-hidden="true" aria-label="Plan inspector">
            <header class="inspector__header">
              <span class="inspector__title">ActionPlan</span>
              <span class="inspector__source" id="inspectorSource">preset</span>
              <button id="inspectorClose" class="inspector__close" type="button" aria-label="Close inspector">×</button>
            </header>
            <div class="inspector__meta" id="inspectorMeta">—</div>
            <pre class="inspector__json" id="inspectorJson">{}</pre>
          </aside>

          <div id="hints" class="hints" aria-label="Keyboard shortcuts">
            <div class="hints__row"><kbd>/</kbd><span>focus prompt</span></div>
            <div class="hints__row"><kbd>1–N</kbd><span>select preset</span></div>
            <div class="hints__row"><kbd>i</kbd><span>inspector</span></div>
            <div class="hints__row"><kbd>c</kbd><span>toggle camera</span></div>
            <div class="hints__row"><kbd>Esc</kbd><span>dismiss</span></div>
          </div>

          <div id="boot" class="boot">
            <div class="boot__inner">
              <div class="boot__title">initializing vision</div>
              <div class="boot__step" id="bootStep">requesting camera…</div>
              <div class="boot__bar"><div class="boot__bar-fill" id="bootBar"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- TensorFlow.js + COCO-SSD (object detection) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <!-- OpenCV.js (object-local CV + foreground/background subtraction) -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window.__cvReady=true"></script>

    <script type="module" src="./app.js"></script>
  </body>
</html>
